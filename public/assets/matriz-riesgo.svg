<!--
  ============================================================
  ELEMENTO FIRMA DEL SITIO: Matriz de Riesgo 5x5
  ============================================================
  Qué es: una matriz de Probabilidad x Impacto es la herramienta
  visual más reconocible en gestión de riesgos (ISO 31000, COSO).
  Se usa aquí como gráfico principal del hero porque comunica de
  inmediato "de qué trata este sitio" sin necesitar una foto.

  Cómo editarla en VS Code:
  - Cada <rect> es una celda de la matriz. La fila (y) representa
    el IMPACTO (de abajo=bajo a arriba=alto) y la columna (x) la
    PROBABILIDAD (de izquierda=baja a derecha=alta).
  - El color de cada celda va de suave (bajo riesgo) a intenso
    (alto riesgo). Los valores de color están definidos como
    "custom properties" (variables) en estilos.css, así que si
    cambias la paleta ahí, este gráfico se actualiza solo.
  - class="celda" + el atributo data-nivel controla la animación
    de entrada (ver @keyframes en estilos.css).
  - Si quieres agregar el punto que marca "dónde cae" un riesgo
    específico en una presentación, usa el <circle class="marcador">
    del final y cambia cx/cy a la celda que corresponda.
  ============================================================
-->
<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titulo-matriz">
  <title id="titulo-matriz">Matriz de riesgo: probabilidad frente a impacto</title>

  <!-- Ejes -->
  <line x1="60" y1="20" x2="60" y2="360" stroke="#B8C2C9" stroke-width="1.5"/>
  <line x1="60" y1="360" x2="400" y2="360" stroke="#B8C2C9" stroke-width="1.5"/>

  <!-- Etiquetas de ejes -->
  <text x="230" y="405" text-anchor="middle" class="etiqueta-eje">PROBABILIDAD</text>
  <text x="24" y="190" text-anchor="middle" class="etiqueta-eje" transform="rotate(-90 24 190)">IMPACTO</text>

  <!-- Cuadrícula 5x5 de celdas de riesgo -->
  <g transform="translate(66,26)">
    <!-- Fila 5 (impacto muy alto) -->
    <rect class="celda" data-nivel="3" x="0"   y="0"  width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="67"  y="0"  width="63" height="63"/>
    <rect class="celda" data-nivel="4" x="134" y="0"  width="63" height="63"/>
    <rect class="celda" data-nivel="4" x="201" y="0"  width="63" height="63"/>
    <rect class="celda" data-nivel="5" x="268" y="0"  width="63" height="63"/>

    <!-- Fila 4 -->
    <rect class="celda" data-nivel="2" x="0"   y="67" width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="67"  y="67" width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="134" y="67" width="63" height="63"/>
    <rect class="celda" data-nivel="4" x="201" y="67" width="63" height="63"/>
    <rect class="celda" data-nivel="5" x="268" y="67" width="63" height="63"/>

    <!-- Fila 3 (impacto medio) -->
    <rect class="celda" data-nivel="1" x="0"   y="134" width="63" height="63"/>
    <rect class="celda" data-nivel="2" x="67"  y="134" width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="134" y="134" width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="201" y="134" width="63" height="63"/>
    <rect class="celda" data-nivel="4" x="268" y="134" width="63" height="63"/>

    <!-- Fila 2 -->
    <rect class="celda" data-nivel="1" x="0"   y="201" width="63" height="63"/>
    <rect class="celda" data-nivel="1" x="67"  y="201" width="63" height="63"/>
    <rect class="celda" data-nivel="2" x="134" y="201" width="63" height="63"/>
    <rect class="celda" data-nivel="2" x="201" y="201" width="63" height="63"/>
    <rect class="celda" data-nivel="3" x="268" y="201" width="63" height="63"/>

    <!-- Fila 1 (impacto muy bajo) -->
    <rect class="celda" data-nivel="1" x="0"   y="268" width="63" height="63"/>
    <rect class="celda" data-nivel="1" x="67"  y="268" width="63" height="63"/>
    <rect class="celda" data-nivel="1" x="134" y="268" width="63" height="63"/>
    <rect class="celda" data-nivel="2" x="201" y="268" width="63" height="63"/>
    <rect class="celda" data-nivel="2" x="268" y="268" width="63" height="63"/>
  </g>

  <!-- Marcador de ejemplo: un riesgo ubicado en probabilidad alta / impacto alto -->
  <circle class="marcador" cx="333" cy="60" r="7"/>
</svg>
